<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mariia Khoziainova - Photographer</title>
  <link rel="stylesheet" href="css/style.css">
  
  <!-- Load jQuery first -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  
  <!-- Then load slabText -->
  <script src="js/jquery.slabtext.js"></script>
</head>
<body>
  <!-- Basic custom cursor element -->
  <div id="custom-cursor" class="custom-cursor"></div>
  
  <div class="gallery-container">
    <div class="gallery">
      <div class="gallery-item">
        <img src="photos/image 1.jpg" alt="Image 1" class="grabbable">
      </div>
      <div class="gallery-item">
        <img src="photos/image 2.jpg" alt="Image 2" class="grabbable">
      </div>
      <div class="gallery-item">
        <img src="photos/image 3.jpg" alt="Image 3" class="grabbable">
      </div>
      <div class="gallery-item">
        <img src="photos/image 4.jpg" alt="Image 4" class="grabbable">
      </div>
      <div class="gallery-item">
        <img src="photos/image 5.jpg" alt="Image 5" class="grabbable">
      </div>
      <div class="gallery-item">
        <img src="photos/image 6.jpg" alt="Image 6" class="grabbable">
      </div>
    </div>
  </div>
      
  <div class="text-container">
    <h1>MARIIA&nbsp;KHOZIAINOVA</h1>
    <p>photographer</p>
  </div>

  <!-- GSAP scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Draggable.min.js"></script>
  
  <!-- Lottie animation library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.9.6/lottie.min.js"></script>
  
  <!-- Main scripts -->
  <script src="js/main.js"></script>
  
  <!-- SlabText initialization with animation -->
  <script>
    $(document).ready(function() {
      // Add the slabtexted class to body
      $('body').addClass('slabtexted');

      // Initialize slabText with custom settings
      $('.text-container h1').slabText({
        fontRatio: 0.3,
        postTweak: true,
        onRender: function() {
          const spans = $('.slabtext');
          gsap.set(spans, {
            yPercent: 100,
            opacity: 0
          });
          gsap.to(spans, {
            yPercent: 0,
            opacity: 1,
            duration: 0.7,
            stagger: 0.05,
            ease: "power4.out"
          });
        }
      });
    });
  </script>

</body>
</html>
